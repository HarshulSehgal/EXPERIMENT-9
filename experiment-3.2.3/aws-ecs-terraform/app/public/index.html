<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experiment 3.2.3 - AWS ECS App</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #fef3c7, #fff7ed, #fde68a);
        color: #1f2937;
      }
      .wrap {
        max-width: 800px;
        margin: 60px auto;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid #fbbf24;
        border-radius: 16px;
        padding: 28px;
      }
      h1 { margin-top: 0; }
      .chip {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fef3c7;
        border: 1px solid #f59e0b;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Experiment 3.2.3</h1>
      <p class="chip">AWS ECS + ALB + Auto Scaling</p>
      <p id="msg">Loading API message...</p>
    </div>
    <script>
      fetch('/api/message')
        .then((res) => res.json())
        .then((data) => {
          document.getElementById('msg').textContent = data.message;
        })
        .catch(() => {
          document.getElementById('msg').textContent = 'API request failed.';
        });
    </script>
  </body>
</html>
